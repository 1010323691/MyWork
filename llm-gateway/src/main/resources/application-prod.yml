server:
  # 生产环境下信任反向代理转发的协议和来源信息，便于正确识别 HTTPS
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        # 仅允许服务端脚本访问 Session Cookie，降低 XSS 窃取风险
        http-only: true
        # 是否仅在 HTTPS 下发送 Session Cookie；当前默认兼容 HTTP，启用 HTTPS 后建议改为 true
        secure: ${SERVER_SESSION_COOKIE_SECURE:false}
        # 跨站导航时保留登录态，同时降低被第三方站点滥用的风险
        same-site: lax

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  thymeleaf:
    cache: true

logging:
  file:
    path: /var/log/llm-gateway
  level:
    com.nexusai.llm.gateway: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  security:
    swagger-enabled: false
    allowed-origin-patterns: ${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS:}
