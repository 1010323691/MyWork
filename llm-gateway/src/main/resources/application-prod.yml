spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  thymeleaf:
    cache: true

logging:
  level:
    com.nexusai.llm.gateway: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  security:
    swagger-enabled: false
    allowed-origin-patterns: ${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS:}
