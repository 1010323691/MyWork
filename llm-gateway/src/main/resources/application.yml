server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/llm_gateway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotFound=true
    username: llm_gateway
    password: Aa1010323691
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0  # 开发环境禁用缓存

  thymeleaf:
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html
    cache: false
  mvc:
    async:
      request-timeout: 300000

logging:
  level:
    com.nexusai.llm.gateway: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
