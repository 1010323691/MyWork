server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/llm_gateway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotFound=true}
    username: ${DB_USERNAME:llm_gateway}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: ${STATIC_CACHE_PERIOD:3600}
  thymeleaf:
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html
    cache: true
  mvc:
    async:
      request-timeout: 300000

logging:
  level:
    com.nexusai.llm.gateway: INFO
    org.springframework.security: WARN

gateway:
  default-backend-url: ${GATEWAY_DEFAULT_BACKEND_URL:}
  forward:
    connect-timeout-seconds: ${GATEWAY_FORWARD_CONNECT_TIMEOUT_SECONDS:30}
    read-timeout-seconds: ${GATEWAY_FORWARD_READ_TIMEOUT_SECONDS:300}
    max-in-memory-size-bytes: ${GATEWAY_FORWARD_MAX_IN_MEMORY_SIZE_BYTES:16777216}
  upstream:
    circuit-failure-threshold: ${GATEWAY_UPSTREAM_CIRCUIT_FAILURE_THRESHOLD:5}
    circuit-reset-minutes: ${GATEWAY_UPSTREAM_CIRCUIT_RESET_MINUTES:5}
    connectivity-timeout-seconds: ${GATEWAY_UPSTREAM_CONNECTIVITY_TIMEOUT_SECONDS:5}
    model-discovery-timeout-seconds: ${GATEWAY_UPSTREAM_MODEL_DISCOVERY_TIMEOUT_SECONDS:30}
  async:
    request-timeout-ms: ${GATEWAY_ASYNC_REQUEST_TIMEOUT_MS:300000}
    executor-core-pool-size: ${GATEWAY_ASYNC_EXECUTOR_CORE_POOL_SIZE:8}
    executor-max-pool-size: ${GATEWAY_ASYNC_EXECUTOR_MAX_POOL_SIZE:32}
    executor-queue-capacity: ${GATEWAY_ASYNC_EXECUTOR_QUEUE_CAPACITY:200}

app:
  security:
    swagger-enabled: ${APP_SECURITY_SWAGGER_ENABLED:false}
    allowed-origin-patterns: ${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.16.*:*,http://172.17.*:*,http://172.18.*:*,http://172.19.*:*,http://172.2*.*:*,http://172.30.*:*,http://172.31.*:*}
    protection:
      enabled: ${APP_SECURITY_PROTECTION_ENABLED:true}
      login:
        ip-max-requests: ${APP_SECURITY_PROTECTION_LOGIN_IP_MAX_REQUESTS:5}
        ip-window-minutes: ${APP_SECURITY_PROTECTION_LOGIN_IP_WINDOW_MINUTES:1}
        failure:
          max-attempts: ${APP_SECURITY_PROTECTION_LOGIN_FAILURE_MAX_ATTEMPTS:5}
          window-minutes: ${APP_SECURITY_PROTECTION_LOGIN_FAILURE_WINDOW_MINUTES:10}
          lock-minutes: ${APP_SECURITY_PROTECTION_LOGIN_FAILURE_LOCK_MINUTES:15}
      register:
        ip-max-requests: ${APP_SECURITY_PROTECTION_REGISTER_IP_MAX_REQUESTS:2}
        ip-window-minutes: ${APP_SECURITY_PROTECTION_REGISTER_IP_WINDOW_MINUTES:10}
      write:
        max-requests: ${APP_SECURITY_PROTECTION_WRITE_MAX_REQUESTS:60}
        window-minutes: ${APP_SECURITY_PROTECTION_WRITE_WINDOW_MINUTES:1}
      completion:
        max-requests: ${APP_SECURITY_PROTECTION_COMPLETION_MAX_REQUESTS:30}
        window-minutes: ${APP_SECURITY_PROTECTION_COMPLETION_WINDOW_MINUTES:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
