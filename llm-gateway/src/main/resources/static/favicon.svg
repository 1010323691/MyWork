<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 网关节点设计 - 简洁几何风格 -->
  <defs>
    <linearGradient id="gateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
  </defs>

  <!-- 外层方框 -->
  <rect x="4" y="4" width="24" height="24" rx="6" fill="none" stroke="url(#gateGradient)" stroke-width="2" stroke-linecap="round"/>

  <!-- 中心节点 -->
  <circle cx="16" cy="16" r="5" fill="url(#gateGradient)"/>

  <!-- 连接线条 - 上下 -->
  <line x1="16" y1="4" x2="16" y2="11" stroke="url(#gateGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="16" y2="28" stroke="url(#gateGradient)" stroke-width="2" stroke-linecap="round"/>

  <!-- 连接线条 - 左右 -->
  <line x1="4" y1="16" x2="11" y2="16" stroke="url(#gateGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="16" x2="28" y2="16" stroke="url(#gateGradient)" stroke-width="2" stroke-linecap="round"/>
</svg>
