<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('Key 管理', '/css/admin.css')}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <div class="container">
        <h2 style="margin-bottom: 20px;">API Key 管理</h2>

        <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

        <!-- Key 表格 -->
        <div class="card">
            <div id="keysLoading" class="spinner">加载中...</div>
            <div id="keysContent" class="d-none">
                <table class="table">
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>Key</th>
                            <th>归属用户</th>
                            <th>配额</th>
                            <th>已使用</th>
                            <th>目标 URL</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="keysTableBody"></tbody>
                </table>
                <div id="keysPagination" class="pagination"></div>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div id="editModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑 API Key</h3>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editKeyId">
                <div class="form-group">
                    <label>Token 配额</label>
                    <input type="number" id="editTokenLimit" placeholder="留空表示无限制">
                </div>
                <div class="form-group">
                    <label>目标 URL</label>
                    <input type="text" id="editTargetUrl" placeholder="http://localhost:11434">
                </div>
                <div class="form-group">
                    <label>路由配置 (JSON)</label>
                    <textarea id="editRoutingConfig" rows="4" placeholder='{"modelMappings":{"gpt-4":"llama3"}}'></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="saveKeyEdit()" class="btn btn-primary">保存</button>
                <button onclick="closeModal()" class="btn" style="margin-left: 8px;">取消</button>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragments/scripts :: scripts('/js/admin-keys.js')}"></th:block>
</body>
</html>
