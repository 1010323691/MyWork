<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('系统监控', '/css/admin.css')}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>系统监控</h2>
            <span style="font-size:13px;color:#999;">每30秒自动刷新</span>
        </div>

        <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalRequests">-</div>
                <div class="stat-label">总请求数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTokens">-</div>
                <div class="stat-label">总 Token 消耗</div>
            </div>
            <div class="stat-card stat-card-danger">
                <div class="stat-value" id="errorRate">-</div>
                <div class="stat-label">错误率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgLatency">-</div>
                <div class="stat-label">平均延迟 (ms)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">-</div>
                <div class="stat-label">用户总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalApiKeys">-</div>
                <div class="stat-label">API Key 总数</div>
            </div>
        </div>

        <!-- 成功/失败对比 -->
        <div class="card" style="margin-top:20px;">
            <div class="card-title">请求成功/失败</div>
            <div style="display:flex; gap:30px; font-size:16px; padding:10px 0;">
                <span>✅ 成功: <strong id="successRequests">-</strong></span>
                <span>❌ 失败: <strong id="failRequests">-</strong></span>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragments/scripts :: scripts('/js/admin-monitor.js')}"></th:block>
</body>
</html>
