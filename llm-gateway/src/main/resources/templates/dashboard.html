<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('管理控制台', '/css/dashboard.css')}"></th:block>
</head>
<body>
    <!-- 头部导航栏 -->
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <!-- 主容器 -->
    <div class="container">
        <!-- 用户信息提示（动态显示，由 JS 控制） -->
        <div id="userInfoAlert" class="alert alert-info" style="margin-bottom: 20px; display: none;">
            当前角色：<strong id="userRole"></strong>
            <span id="userRoleDesc"></span>
        </div>

        <!-- 标签页导航 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('apikeys')">API Key 管理</button>
            <button class="tab" onclick="switchTab('usage')">使用统计</button>
            <button class="tab" onclick="switchTab('client')">客户端工具</button>
        </div>

        <!-- 提示消息 -->
        <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

        <!-- API Key 管理/查看 -->
        <div id="apikeys" class="tab-content active">
            <!-- 创建 API Key 卡片 -->
            <div class="card" id="createApiKeyCard">
                <div class="card-title">创建 API Key</div>
                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label>名称</label>
                            <input type="text" id="apiKeyName" placeholder="例如：Production Key">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label>Token 配额 (可选)</label>
                            <input type="number" id="tokenLimit" placeholder="留空表示无限制">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label>过期天数 (可选)</label>
                            <input type="number" id="expiresAtDays" placeholder="留空表示永不过期">
                        </div>
                    </div>
                </div>
                <button onclick="createApiKey()" class="btn btn-primary">创建</button>
            </div>

            <!-- API Key 列表卡片 -->
            <div class="card">
                <div class="card-title">
                    API Key 列表
                    <span id="apiKeyListSubtext" style="font-size: 14px; color: #666; font-weight: normal;"></span>
                </div>
                <div id="loading" class="spinner">加载中...</div>
                <div id="apiKeyList" class="d-none">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>Key</th>
                                <th>配额</th>
                                <th>已使用</th>
                                <th>状态</th>
                                <th>过期时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="apiKeyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 使用统计 -->
        <div id="usage" class="tab-content">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="todayTokens">0</div>
                    <div class="stat-label">今日 Token</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="monthTokens">0</div>
                    <div class="stat-label">本月 Token</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalRequests">0</div>
                    <div class="stat-label">总请求数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="successRate">0%</div>
                    <div class="stat-label">成功率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalApiKeys">0</div>
                    <div class="stat-label">API Key 总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="activeApiKeys">0</div>
                    <div class="stat-label">启用中</div>
                </div>
            </div>
            <div class="card" style="margin-top: 20px;">
                <div class="card-title">近7日 Token 趋势</div>
                <div id="tokenTrendChart" style="height: 300px;"></div>
            </div>
        </div>

        <!-- 客户端工具 -->
        <div id="client" class="tab-content">
            <div class="card">
                <div class="card-title">Token 余量查询</div>
                <p style="color: #666; margin-bottom: 24px;">
                    使用 API Key 查询剩余 Token 数量
                </p>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="text" id="clientApiKey" placeholder="nkey_...">
                </div>
                <button onclick="checkTokenUsage()" class="btn btn-primary">查询</button>

                <!-- 查询结果 -->
                <div id="tokenUsageResult" style="display: none; margin-top: 30px;">
                    <div class="card" style="background: #f8f9fa;">
                        <div class="form-group">
                            <label>API Key 名称</label>
                            <p id="usageKeyName" style="font-size: 16px; color: #333;"></p>
                        </div>
                        <div class="row">
                            <div class="col">
                                <div class="form-group">
                                    <label>总配额</label>
                                    <p id="usageTotal" style="font-size: 28px; color: #007bff; font-weight: bold;"></p>
                                </div>
                            </div>
                            <div class="col">
                                <div class="form-group">
                                    <label>已使用</label>
                                    <p id="usageUsed" style="font-size: 28px; color: #6c757d; font-weight: bold;"></p>
                                </div>
                            </div>
                            <div class="col">
                                <div class="form-group">
                                    <label>剩余</label>
                                    <p id="usageRemaining" style="font-size: 28px; color: #28a745; font-weight: bold;"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入公共脚本和管理后台专用脚本 -->
    <th:block th:replace="~{fragments/scripts :: scripts('/js/dashboard.js')}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</body>
</html>
