<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- 头部导航栏片段 - 由 JS 动态渲染用户信息 -->
<th:block th:fragment="header">
    <div class="header">
        <div class="header-content">
            <div class="logo">LLM Gateway</div>
            <nav class="header-nav">
                <a href="/dashboard">控制台</a>
                <a href="/logs">请求日志</a>
                <a href="/admin/users" class="admin-only" style="display:none;">用户管理</a>
                <a href="/admin/keys" class="admin-only" style="display:none;">Key 管理</a>
                <a href="/admin/monitor" class="admin-only" style="display:none;">系统监控</a>
            </nav>
            <div class="user-info" id="userInfo">
                <!-- 由 JS 动态填充 -->
            </div>
        </div>
    </div>
    <script>
        (function() {
            var token = localStorage.getItem('token');
            if (token) {
                try {
                    var payload = JSON.parse(atob(token.split('.')[1]));
                    var authorities = payload.authorities || [];
                    var isAdmin = authorities.some(function(a) { return a === 'ROLE_ADMIN'; });
                    if (isAdmin) {
                        document.querySelectorAll('.admin-only').forEach(function(el) {
                            el.style.display = '';
                        });
                    }
                } catch(e) {}
            }
        })();
    </script>
</th:block>

</html>
