<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- 导航菜单组件 (含权限控制，ARIA 增强版 - 科技风主题) -->
<th:block th:fragment="nav">
    <nav class="sidebar-nav" aria-label="主导航">

        <!-- 1. 总览 (Overview) - Dashboard Icon -->
        <a href="/dashboard" class="nav-item" th:classappend="${currentPage == 'dashboard'} ? 'active'"
           aria-current="${currentPage == 'dashboard'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                </svg>
            </span>
            <span>总览</span>
        </a>

        <!-- 2. 实时监控 (Monitoring) - Activity/Chart Icon -->
        <a href="/admin/monitor" class="nav-item" th:classappend="${currentPage == 'admin/monitor'} ? 'active'"
           aria-current="${currentPage == 'admin/monitor'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
                </svg>
            </span>
            <span>实时监控</span>
        </a>

        <!-- 请求日志 (普通用户可见) -->
        <a href="/logs" class="nav-item" th:classappend="${currentPage == 'logs'} ? 'active'"
           aria-current="${currentPage == 'logs'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <path d="M9 15l2 2 4-4"/>
                </svg>
            </span>
            <span>请求日志</span>
        </a>

        <!-- 3. 用户与用量 (Users & Usage) - Users Icon -->
        <div class="nav-section-label" th:if="${currentUserRole == 'ADMIN'}">管理与配置</div>

        <a href="/admin/users" class="nav-item admin-only"
            th:classappend="${currentPage == 'admin/users'} ? 'active'"
            th:if="${currentUserRole == 'ADMIN'}"
            aria-current="${currentPage == 'admin/users'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </span>
            <span>用户与用量</span>
        </a>

        <!-- 4. 计费与财务 (Billing) - Credit Card Icon -->
        <a href="/admin/pricing" class="nav-item admin-only"
            th:classappend="${currentPage == 'admin/pricing'} ? 'active'"
            th:if="${currentUserRole == 'ADMIN'}"
            aria-current="${currentPage == 'admin/pricing'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                    <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
            </span>
            <span>计费与财务</span>
        </a>

        <!-- Key 管理 (合并到用户与用量或单独显示) -->
        <a href="/admin/keys" class="nav-item admin-only"
            th:classappend="${currentPage == 'admin/keys'} ? 'active'"
            th:if="${currentUserRole == 'ADMIN'}"
            aria-current="${currentPage == 'admin/keys'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3 5l1 1"/>
                </svg>
            </span>
            <span>API Key</span>
        </a>

        <!-- 5. 风控与安全 (Security) - Shield Icon -->
        <a href="/admin/security" class="nav-item admin-only"
            th:classappend="${currentPage == 'admin/security'} ? 'active'"
            th:if="${currentUserRole == 'ADMIN'}"
            aria-current="${currentPage == 'admin/security'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </span>
            <span>风控与安全</span>
        </a>

        <!-- 6. 系统与模型 (System / Models) - Server/Settings Icon -->
        <a href="/admin/providers" class="nav-item admin-only"
            th:classappend="${currentPage == 'admin/providers'} ? 'active'"
            th:if="${currentUserRole == 'ADMIN'}"
            aria-current="${currentPage == 'admin/providers'} ? 'page' : null">
            <span class="nav-icon svg-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                    <line x1="6" y1="6" x2="6.01" y2="6"/>
                    <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
            </span>
            <span>系统与模型</span>
        </a>

    </nav>
</th:block>

</html>
