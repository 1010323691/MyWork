<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- 基础布局模板 -->
<th:block th:fragment="layout (pageTitle, content, extraCss)">
    <head>
        <th:block th:replace="~{fragments/head :: head(${pageTitle})}"></th:block>
        <!-- 页面专用样式 -->
        <link rel="stylesheet" th:if="${extraCss != null}" th:href="@{${extraCss}}">
        <th:block th:if="${#ctx.containsVariable('extraHead') and extraHead != null}">
            <th:block th:replace="~{${extraHead}}"></th:block>
        </th:block>
    </head>
    <body th:class="${#ctx.containsVariable('bodyClass') ? bodyClass : null}">
        <div class="layout-container">
            <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>
            <main class="main-content">
                <div class="page-content">
                    <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
                    <div class="page-content-wrapper">
                        <th:block th:replace="${content}"></th:block>
                    </div>
                </div>
            </main>
        </div>
        <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
        <th:block th:if="${#ctx.containsVariable('extraScripts') and extraScripts != null}">
            <th:block th:replace="~{${extraScripts}}"></th:block>
        </th:block>
    </body>
</th:block>

</html>
