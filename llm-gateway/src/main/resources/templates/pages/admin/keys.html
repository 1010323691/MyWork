<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key 管理 - LLM Gateway</title>

    <!-- 公共样式 -->
    <link rel="stylesheet" th:href="@{/css/common-tech-theme.css}">
</head>
<body>
    <div class="layout-container">
        <!-- 侧边栏 -->
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <!-- 主内容区域 -->
        <main class="main-content">
            <div class="page-content">
                <!-- 提示消息 -->
                <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

                <!-- 页面内容区域 -->
                <div class="page-content-wrapper">
                    <!-- 图表展示区 -->
                    <div class="row" style="margin-bottom: 20px;">
                        <div class="col">
                            <div class="card">
                                <div id="topKeysChart" style="height: 300px;"></div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card">
                                <div id="tokenTrendChart" style="height: 300px;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- API Key 管理表格 -->
                    <div class="card">
                        <div class="card-title">API Key 管理</div>

                        <div id="keysLoading" class="spinner">加载中...</div>
                        <div id="keysContainer" class="d-none">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>名称</th>
                                        <th>Key</th>
                                        <th>归属用户</th>
                                        <th>配额</th>
                                        <th>已使用</th>
                                        <th>目标 URL</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="keysTableBody"></tbody>
                            </table>
                            <div id="keysPagination" class="pagination"></div>
                        </div>
                    </div>

                    <!-- 编辑模态框 -->
                    <div id="editModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
                        <div class="modal-content" onclick="event.stopPropagation()">
                            <div class="modal-header">
                                <h3>编辑 API Key</h3>
                                <button onclick="closeModal()" class="modal-close">&times;</button>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" id="editKeyId">
                                <div class="form-group">
                                    <label>Token 配额</label>
                                    <input type="number" id="editTokenLimit" placeholder="留空表示无限制">
                                </div>
                                <div class="form-group">
                                    <label>目标 URL</label>
                                    <input type="text" id="editTargetUrl" placeholder="http://localhost:11434">
                                </div>
                                <div class="form-group">
                                    <label>路由配置 (JSON)</label>
                                    <textarea id="editRoutingConfig" rows="4" placeholder='{"modelMappings":{"gpt-4":"llama3"}}'></textarea>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button onclick="saveKeyEdit()" class="btn btn-primary">保存</button>
                                <button onclick="closeModal()" class="btn" style="margin-left: 8px;">取消</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 公共脚本 -->
    <script th:src="@{/js/common.js}"></script>
    <!-- ECharts CDN (必须放在 echarts-tech-theme.js 之前) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <!-- ECharts Tech Theme -->
    <script th:src="@{/js/echarts-tech-theme.js}"></script>
    <!-- 页面脚本 (需要使用 echarts 和 TechChartTheme) -->
    <script th:src="@{/js/admin-keys.js}"></script>
</body>
</html>
