<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Key 管理 - LLM Gateway</title>

    <link rel="stylesheet" th:href="@{/css/common-tech-theme.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="layout-container">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <div class="page-content">
                <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

                <div class="page-content-wrapper">
                    <div class="page-header">
                        <h2>API Key 管理</h2>
                        <p class="text-muted">API Key 仅用于认证与路由，计费与余额归属用户账户。</p>
                    </div>

                    <div class="card">
                        <div class="card-title">筛选与操作</div>
                        <div class="filter-bar">
                            <div class="filter-row">
                                <div class="filter-item" th:if="${currentUserRole == 'ADMIN'}" style="flex: 1.3; min-width: 220px;">
                                    <label>关键字</label>
                                    <input type="text" id="keywordInput" placeholder="搜索用户、Key 名称或目标 URL">
                                </div>
                                <div class="filter-item" th:if="${currentUserRole == 'ADMIN'}" style="min-width: 220px;">
                                    <label>所属用户</label>
                                    <select id="userFilter">
                                        <option value="">全部用户</option>
                                    </select>
                                </div>
                                <div class="filter-item" th:if="${currentUserRole == 'ADMIN'}" style="min-width: 160px;">
                                    <label>状态</label>
                                    <select id="statusFilter">
                                        <option value="">全部状态</option>
                                        <option value="enabled">启用</option>
                                        <option value="disabled">禁用</option>
                                    </select>
                                </div>
                                <div class="filter-item filter-btn">
                                    <button class="btn btn-primary" th:if="${currentUserRole == 'ADMIN'}" type="button" onclick="applyFilters()">查询</button>
                                    <button class="btn btn-secondary" th:if="${currentUserRole == 'ADMIN'}" type="button" onclick="resetFilters()">重置</button>
                                    <button class="btn btn-success" type="button" onclick="openCreateModal()">创建 Key</button>
                                </div>
                            </div>
                        </div>

                        <div id="keysLoading" class="spinner">加载中...</div>
                        <div id="keysContainer" class="d-none">
                            <div class="table-meta">
                                <span id="keysSummaryText" class="text-muted">共 0 条</span>
                            </div>
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th th:if="${currentUserRole == 'ADMIN'}">所属用户</th>
                                        <th>名称</th>
                                        <th>Key</th>
                                        <th>Token 用量</th>
                                        <th>最近使用</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="keysTableBody"></tbody>
                            </table>
                            <div id="keysPagination" class="pagination"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="createModal" class="modal-overlay" onclick="if(event.target===this)closeModal('createModal')">
        <div class="modal-content admin-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>创建 API Key</h3>
                <button class="modal-close" type="button" onclick="closeModal('createModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="createName">名称</label>
                    <input type="text" id="createName" placeholder="例如：Production Key">
                </div>
                <p class="text-muted" th:if="${currentUserRole == 'ADMIN'}">管理员未指定用户时，默认为当前登录账号创建 Key。</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" type="button" onclick="createKey()">创建</button>
                <button class="btn btn-secondary" type="button" onclick="closeModal('createModal')">取消</button>
            </div>
        </div>
    </div>

    <div id="keyActionMenu" class="user-action-menu d-none">
        <button id="keyActionToggleItem" class="user-action-menu-item" type="button" onclick="toggleKeyFromMenu()"></button>
        <button class="user-action-menu-item danger" type="button" onclick="deleteKeyFromMenu()">删除 Key</button>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/admin-keys.js}"></script>
</body>
</html>
