<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Key 管理 - LLM Gateway</title>

    <link rel="stylesheet" th:href="@{/css/common-tech-theme.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="layout-container">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <div class="page-content">
                <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

                <div class="page-content-wrapper">
                    <div class="page-header">
                        <h2>API Key 管理</h2>
                        <p class="text-muted">管理员可以查看全量 Key，并为任意用户创建、编辑和停用 Key。</p>
                    </div>

                    <div class="keys-page-tabs">
                        <button id="overviewTabBtn" class="keys-page-tab active" type="button" onclick="switchKeysPage('overview')">概览</button>
                        <button id="listTabBtn" class="keys-page-tab" type="button" onclick="switchKeysPage('list')">检索与列表</button>
                    </div>

                    <div id="keysOverviewPage" class="keys-page-panel active">
                        <div class="stats-grid" style="margin-bottom: 24px;">
                            <div class="stat-card">
                                <div class="stat-value" id="totalKeysStat">0</div>
                                <div class="stat-label">Key 总数</div>
                                <div class="stat-sublabel" id="totalKeysSubtext">当前筛选结果</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="activeKeysStat">0</div>
                                <div class="stat-label">启用中</div>
                                <div class="stat-sublabel" id="activeKeysSubtext">可正常调用</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="coveredUsersStat">0</div>
                                <div class="stat-label">覆盖用户数</div>
                                <div class="stat-sublabel" id="coveredUsersSubtext">拥有 Key 的用户</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="usedTokensStat">0</div>
                                <div class="stat-label">累计已用 Token</div>
                                <div class="stat-sublabel" id="usedTokensSubtext">全量使用情况</div>
                            </div>
                        </div>

                        <div class="row" style="margin-bottom: 20px;">
                            <div class="col">
                                <div class="card">
                                    <div class="card-title">Top 用户 Key 数</div>
                                    <div id="topUsersChart" style="height: 280px;"></div>
                                </div>
                            </div>
                            <div class="col">
                                <div class="card">
                                    <div class="card-title">启用 / 禁用分布</div>
                                    <div id="statusChart" style="height: 280px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="keysListPage" class="keys-page-panel">
                        <div class="card">
                            <div class="card-title">筛选与操作</div>
                            <div class="filter-bar">
                                <div class="filter-row">
                                    <div class="filter-item" style="flex: 1.3; min-width: 220px;">
                                        <label>关键字</label>
                                        <input type="text" id="keywordInput" placeholder="搜索用户名 / Key 名称 / URL">
                                    </div>
                                    <div class="filter-item" style="min-width: 220px;">
                                        <label>所属用户</label>
                                        <select id="userFilter">
                                            <option value="">全部用户</option>
                                        </select>
                                    </div>
                                    <div class="filter-item" style="min-width: 160px;">
                                        <label>状态</label>
                                        <select id="statusFilter">
                                            <option value="">全部状态</option>
                                            <option value="enabled">启用</option>
                                            <option value="disabled">禁用</option>
                                        </select>
                                    </div>
                                    <div class="filter-item filter-btn">
                                        <button class="btn btn-primary" type="button" onclick="applyFilters()">查询</button>
                                        <button class="btn btn-secondary" type="button" onclick="resetFilters()">重置</button>
                                        <button class="btn btn-success" type="button" onclick="openCreateModal()">创建 Key</button>
                                    </div>
                                </div>
                            </div>

                            <div id="keysLoading" class="spinner">加载中...</div>
                            <div id="keysContainer" class="d-none">
                                <div class="table-meta">
                                    <span id="keysSummaryText" class="text-muted">共 0 条</span>
                                </div>
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>所属用户</th>
                                            <th>名称</th>
                                            <th>Key</th>
                                            <th>配额</th>
                                            <th>已用 / 剩余</th>
                                            <th>目标 URL</th>
                                            <th>过期时间</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="keysTableBody"></tbody>
                                </table>
                                <div id="keysPagination" class="pagination"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="createModal" class="modal-overlay" onclick="if(event.target===this)closeModal('createModal')">
        <div class="modal-content admin-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>为用户创建 API Key</h3>
                <button class="modal-close" type="button" onclick="closeModal('createModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="createUserId">所属用户</label>
                    <select id="createUserId"></select>
                </div>
                <div class="form-group">
                    <label for="createName">名称</label>
                    <input type="text" id="createName" placeholder="例如：Production Key">
                </div>
                <div class="form-group">
                    <label for="createTokenLimit">Token 配额</label>
                    <input type="number" id="createTokenLimit" placeholder="留空表示不限额">
                </div>
                <div class="form-group">
                    <label for="createExpiresAtDays">有效天数</label>
                    <input type="number" id="createExpiresAtDays" placeholder="留空表示不过期">
                </div>
                <div class="form-group">
                    <label for="createTargetUrl">目标 URL</label>
                    <input type="text" id="createTargetUrl" placeholder="例如：http://localhost:11434">
                </div>
                <div class="form-group">
                    <label for="createRoutingConfig">路由配置 JSON</label>
                    <textarea id="createRoutingConfig" rows="5" placeholder='{"modelMappings":{"gpt-4":"llama3"}}'></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" type="button" onclick="createKey()">创建</button>
                <button class="btn btn-secondary" type="button" onclick="closeModal('createModal')">取消</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay" onclick="if(event.target===this)closeModal('editModal')">
        <div class="modal-content admin-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>编辑 API Key</h3>
                <button class="modal-close" type="button" onclick="closeModal('editModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editKeyId">
                <div class="form-group">
                    <label for="editKeyOwner">所属用户</label>
                    <input type="text" id="editKeyOwner" disabled>
                </div>
                <div class="form-group">
                    <label for="editTokenLimit">Token 配额</label>
                    <input type="number" id="editTokenLimit" placeholder="留空表示保持原值 / 不限额">
                </div>
                <div class="form-group">
                    <label for="editTargetUrl">目标 URL</label>
                    <input type="text" id="editTargetUrl" placeholder="例如：http://localhost:11434">
                </div>
                <div class="form-group">
                    <label for="editRoutingConfig">路由配置 JSON</label>
                    <textarea id="editRoutingConfig" rows="5" placeholder='{"modelMappings":{"gpt-4":"llama3"}}'></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" type="button" onclick="saveKeyEdit()">保存</button>
                <button class="btn btn-secondary" type="button" onclick="closeModal('editModal')">取消</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script th:src="@{/js/echarts-tech-theme.js}"></script>
    <script th:src="@{/js/admin-keys.js}"></script>
</body>
</html>
