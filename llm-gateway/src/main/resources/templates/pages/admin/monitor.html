<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:with="bodyClass='monitor-page'"
      th:replace="~{layout/base :: layout(${title} + ' - LLM Gateway', ~{::main-content}, '/css/admin-monitor-page.css')}">

<head>
    <title th:text="${title} + ' - LLM Gateway'">系统监控</title>
</head>

<body>
<main th:fragment="main-content">
    <h2 style="color: var(--text-primary); margin-bottom: 24px;">系统监控</h2>


                <h3 style="color: var(--text-primary); margin-bottom: 16px; font-size: 16px;">资源趋势（60 秒）</h3>

                <div class="resource-strip" id="systemResourceRow">
                    <div class="card resource-mini-card">
                        <div class="card-title">CPU 使用率</div>
                        <div id="cpuUsageChart" style="height: 130px;"></div>
                    </div>

                    <div class="card resource-mini-card">
                        <div class="card-title">内存使用率</div>
                        <div id="memoryUsageChart" style="height: 130px;"></div>
                    </div>

                    <div class="card resource-mini-card" id="gpuUsageCard" style="display: none;">
                        <div class="card-title" id="gpuChartTitle">GPU 使用率</div>
                        <div id="gpuUsageChart" style="height: 130px;"></div>
                    </div>

                    <div class="card resource-mini-card" id="gpuMemoryCard" style="display: none;">
                        <div class="card-title">GPU 显存</div>
                        <div id="gpuMemoryChart" style="height: 130px;"></div>
                    </div>

                    <div id="multiGpuContainer"></div>
                </div>

                <h3 style="color: var(--text-primary); margin-bottom: 16px; font-size: 16px;">模型负载</h3>

                <div class="model-load-grid">
                    <div class="card">
                        <div class="card-title">模型占比</div>
                        <div id="modelDistributionPieChart" style="height: 250px;"></div>
                    </div>

                    <div class="card">
                        <div class="card-title">模型 Token 消耗</div>
                        <div id="modelTokenUsageChart" style="height: 250px;"></div>
                    </div>

                    <div class="card">
                        <div class="card-title">模型延迟</div>
                        <div id="modelLatencyChart" style="height: 250px;"></div>
                    </div>
                </div>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script th:src="@{/js/admin-monitor.js}"></script>
</main>
</body>

</html>
