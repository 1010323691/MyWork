<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控 - LLM Gateway</title>

    <!-- 公共样式 -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="layout-container">
        <!-- 侧边栏 -->
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <!-- 主内容区域 -->
        <main class="main-content">
            <div class="page-content">
                <!-- 提示消息 -->
                <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

                <!-- 页面内容区域 -->
                <div class="page-content-wrapper">
                    <!-- 系统信息卡片 -->
                    <div class="card">
                        <div class="card-title">系统信息</div>
                        <div class="system-info-grid">
                            <div class="info-item">
                                <span class="info-label">JVM 内存</span>
                                <span class="info-value" id="jvmMemory">--</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">堆内存使用</span>
                                <span class="info-value" id="heapMemory">--</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">活跃线程</span>
                                <span class="info-value" id="activeThreads">--</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">请求队列</span>
                                <span class="info-value" id="requestQueue">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- 实时请求统计 -->
                    <div class="stats-grid" style="margin-top: 20px;">
                        <!-- Requests Per Second - Activity Icon -->
                        <div class="stat-card">
                            <div class="stat-icon svg-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
                                </svg>
                            </div>
                            <div class="stat-value" id="requestsPerSecond">0</div>
                            <div class="stat-label">请求/秒</div>
                        </div>

                        <!-- Avg Response Time - Clock Icon -->
                        <div class="stat-card">
                            <div class="stat-icon svg-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"/>
                                    <polyline points="12,6 12,12 16,14"/>
                                </svg>
                            </div>
                            <div class="stat-value" id="avgResponseTime">0ms</div>
                            <div class="stat-label">平均响应时间</div>
                        </div>

                        <!-- Error Rate - Alert Circle Icon -->
                        <div class="stat-card">
                            <div class="stat-icon svg-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"/>
                                    <line x1="12" y1="8" x2="12" y2="12"/>
                                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                            </div>
                            <div class="stat-value" id="errorRate">0%</div>
                            <div class="stat-label">错误率</div>
                        </div>

                        <!-- Active Connections - Server/Share Icon -->
                        <div class="stat-card">
                            <div class="stat-icon svg-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="18" cy="5" r="3"/>
                                    <circle cx="6" cy="12" r="3"/>
                                    <circle cx="18" cy="19" r="3"/>
                                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                                </svg>
                            </div>
                            <div class="stat-value" id="activeConnections">0</div>
                            <div class="stat-label">活跃连接</div>
                        </div>
                    </div>

                    <!-- 请求趋势图表 -->
                    <div class="card" style="margin-top: 20px;">
                        <div class="card-title">实时请求趋势</div>
                        <div id="requestTrendChart" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 公共脚本 -->
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/admin-monitor.js}"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</body>
</html>
