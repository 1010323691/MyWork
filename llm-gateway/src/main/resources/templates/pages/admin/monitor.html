<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - LLM Gateway'">系统监控</title>

    <link rel="stylesheet" th:href="@{/css/common-tech-theme.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        #multiGpuContainer {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 12px;
            margin-bottom: 0;
            align-items: stretch;
        }

        .gpu-compact-card {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto;
            gap: 8px;
            padding: 12px 14px;
            min-width: 520px;
            flex: 0 0 520px;
            align-items: stretch;
        }

        .gpu-compact-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            min-width: 0;
            margin-bottom: 2px;
        }

        .gpu-compact-name {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .gpu-compact-meta {
            color: var(--text-secondary);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gpu-chart-stack {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            min-width: 0;
        }

        .gpu-chart-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 6px 8px;
            min-width: 0;
        }

        .gpu-chart-subtitle {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 2px;
        }

        @media (max-width: 1280px) {
            .gpu-compact-card {
                min-width: 480px;
                flex-basis: 480px;
            }
        }

        @media (max-width: 1200px) {
            #systemResourceRow {
                grid-template-columns: none !important;
            }

            .gpu-compact-card {
                min-width: 440px;
                flex-basis: 440px;
            }

            .gpu-chart-stack {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            #systemResourceRow {
                grid-template-columns: none !important;
            }

            .gpu-chart-stack {
                grid-template-columns: 1fr;
            }

            .gpu-compact-card {
                min-width: 90vw;
                flex-basis: 90vw;
            }

            .gpu-compact-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .resource-strip {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 4px;
            margin-bottom: 24px;
            scrollbar-width: thin;
        }

        .resource-strip > .card,
        .resource-strip > #multiGpuContainer {
            flex: 0 0 auto;
        }

        .resource-mini-card {
            width: 360px;
            min-width: 360px;
        }

        .resource-mini-card .card-title {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="layout-container">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <div class="page-content">
                <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

                <h2 style="color: var(--text-primary); margin-bottom: 24px;">系统监控</h2>

                <div class="stats-grid" style="margin-bottom: 24px;">
                    <div class="stat-card">
                        <div class="stat-icon svg-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="22,12 18,12 15,21 9,3 6,12 2,12" />
                            </svg>
                        </div>
                        <div class="stat-value" id="currentQps">0</div>
                        <div class="stat-label">失败请求数</div>
                        <div class="stat-sublabel">累计失败请求</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon svg-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                            </svg>
                        </div>
                        <div class="stat-value" id="tokenRate">0</div>
                        <div class="stat-label">总 Token 消耗</div>
                        <div class="stat-sublabel">累计使用量</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon svg-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="18" cy="5" r="3" />
                                <circle cx="6" cy="12" r="3" />
                                <circle cx="18" cy="19" r="3" />
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                            </svg>
                        </div>
                        <div class="stat-value" id="concurrentRequests">0</div>
                        <div class="stat-label">API Key 数量</div>
                        <div class="stat-sublabel">已创建密钥</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon svg-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12,6 12,12 16,14" />
                            </svg>
                        </div>
                        <div class="stat-value" id="avgResponseTime">0ms</div>
                        <div class="stat-label">平均响应时间</div>
                        <div class="stat-sublabel">近 24 小时</div>
                    </div>
                </div>

                <h3 style="color: var(--text-primary); margin-bottom: 16px; font-size: 16px;">资源趋势（60 秒）</h3>

                <div class="resource-strip" id="systemResourceRow">
                    <div class="card resource-mini-card">
                        <div class="card-title">CPU 使用率</div>
                        <div id="cpuUsageChart" style="height: 130px;"></div>
                    </div>

                    <div class="card resource-mini-card">
                        <div class="card-title">内存使用率</div>
                        <div id="memoryUsageChart" style="height: 130px;"></div>
                    </div>

                    <div class="card resource-mini-card" id="gpuUsageCard" style="display: none;">
                        <div class="card-title" id="gpuChartTitle">GPU 使用率</div>
                        <div id="gpuUsageChart" style="height: 130px;"></div>
                    </div>

                    <div class="card resource-mini-card" id="gpuMemoryCard" style="display: none;">
                        <div class="card-title">GPU 显存</div>
                        <div id="gpuMemoryChart" style="height: 130px;"></div>
                    </div>

                    <div id="multiGpuContainer"></div>
                </div>

                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-title">实时 QPS</div>
                    <div id="realtimeQpsChart" style="height: 300px;"></div>
                </div>

                <div class="row" style="margin-bottom: 24px;">
                    <div class="col">
                        <div class="card">
                            <div class="card-title">Token 趋势</div>
                            <div id="tokenRateChart" style="height: 250px;"></div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card">
                            <div class="card-title">连接趋势</div>
                            <div id="concurrentConnectionsChart" style="height: 250px;"></div>
                        </div>
                    </div>
                </div>

                <h3 style="color: var(--text-primary); margin-bottom: 16px; font-size: 16px;">模型负载</h3>

                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-title">模型占比</div>
                    <div id="modelDistributionPieChart" style="height: 300px;"></div>
                </div>

                <div class="row" style="margin-bottom: 24px;">
                    <div class="col">
                        <div class="card">
                            <div class="card-title">模型 Token 消耗</div>
                            <div id="modelTokenUsageChart" style="height: 250px;"></div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card">
                            <div class="card-title">模型延迟</div>
                            <div id="modelLatencyChart" style="height: 250px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/echarts-tech-theme.js}"></script>
    <script th:src="@{/js/admin-monitor.js}"></script>
</body>

</html>
