<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('上游提供商管理 - LLM Gateway', ~{::main-content}, '/css/admin.css')}">
<head>
    <title>上游提供商管理 - LLM Gateway</title>
</head>
<body>
<main th:fragment="main-content">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">上游提供商管理</div>
                            <button class="btn btn-primary" onclick="showCreateModal()">
                                + 新增提供商
                            </button>
                        </div>

                        <div id="providersLoading" class="spinner">加载中...</div>
                        <div id="providersContainer" class="d-none">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>名称</th>
                                        <th>基础 URL</th>
                                        <th>模型名</th>
                                        <th>服务类型</th>
                                        <th>输入卖出价</th>
                                        <th>输出卖出价</th>
                                        <th>失败次数</th>
                                        <th>状态</th>
                                        <th>熔断状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="providersTableBody"></tbody>
                            </table>
                        </div>
                    </div>
    </div>

    <div id="providerModal" class="modal-overlay d-none">
        <div class="modal-content admin-modal">
            <div class="modal-header">
                <h3 id="modalTitle">新增提供商</h3>
                <button class="modal-close" onclick="event.stopPropagation(); closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="providerForm" class="provider-form">
                    <input type="hidden" id="providerId">

                    <div class="form-group">
                        <label for="name">提供商名称 *</label>
                        <input type="text" id="name" required placeholder="如：LM Studio 节点 01">
                    </div>

                    <div class="form-group">
                        <label for="baseUrl">基础 URL *</label>
                        <input type="text" id="baseUrl" required placeholder="例如：https://upstream.example.com 或 http://10.0.0.8:1234">
                    </div>

                    <div class="form-group">
                        <label for="supportedModels">支持模型 *</label>
                        <textarea id="supportedModels"
                                  rows="5"
                                  required
                                  placeholder="每行一个模型，或用逗号分隔。例如：&#10;qwen2.5-7b-instruct&#10;qwen2.5-14b-instruct&#10;gpt-4o-*"></textarea>
                        <small class="form-help">
                            用于将客户端传入的 `model` 路由到这个算力中心。支持精确匹配和前缀通配，如 `qwen2.5-*`。
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="serviceType">服务类型</label>
                        <div id="serviceType" class="js-custom-dropdown"
                             data-placeholder="请选择服务类型"
                             data-options='[{"value": "OLLAMA", "text": "Ollama"}, {"value": "VLLM", "text": "vLLM"}]'
                             data-value="OLLAMA">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="upstreamKey">上游 API Key</label>
                        <input type="password" id="upstreamKey" placeholder="如上游服务需要鉴权则填写">
                    </div>

                    <div class="form-group">
                        <label for="timeoutSeconds">超时时间（秒）</label>
                        <input type="number" id="timeoutSeconds" value="300" min="1">
                    </div>

                    <div class="form-group">
                        <div style="display:flex;gap:12px;flex-wrap:wrap;">
                            <button type="button" class="btn btn-secondary" onclick="testConnectivity()">测试连通性</button>
                            <button type="button" class="btn btn-secondary" onclick="discoverModels()">拉取上游模型列表</button>
                        </div>
                        <div id="providerToolsResult" style="margin-top:12px;font-size:13px;line-height:1.5;color:#cbd5e1;"></div>
                    </div>

                    <div class="form-group">
                        <label>输入 Token 定价（元 / 百万 Token）</label>
                        <div class="price-row">
                            <input type="number" id="buyPriceInput" step="0.000001" placeholder="买入价">
                            <input type="number" id="sellPriceInput" step="0.000001" placeholder="卖出价">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>输出 Token 定价（元 / 百万 Token）</label>
                        <div class="price-row">
                            <input type="number" id="buyPriceOutput" step="0.000001" placeholder="买入价">
                            <input type="number" id="sellPriceOutput" step="0.000001" placeholder="卖出价">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="enabled" checked> 启用
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveProvider()">保存</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/custom-dropdown.js}"></script>
    <script th:src="@{/js/admin-providers.js}"></script>
</main>
</body>
</html>
