<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - LLM Gateway</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="layout-container">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <div class="page-content">
                <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

                <div class="page-content-wrapper">
                    <div class="card">
                        <div style="padding: 20px 0;">
                            <div class="filter-bar">
                                <div class="filter-row">
                                    <div class="filter-item" style="flex: 1; min-width: 150px; margin-right: 10px;">
                                        <label>用户 ID</label>
                                        <input type="number" id="userIdSearch" placeholder="输入用户 ID">
                                    </div>
                                    <div class="filter-item" style="flex: 1; min-width: 200px; margin-right: 10px;">
                                        <label>搜索用户名</label>
                                        <input type="text" id="usernameSearch" placeholder="输入用户名搜索...">
                                    </div>
                                    <div class="filter-item filter-btn">
                                        <button class="btn btn-primary" type="button" onclick="searchUsers()">搜索</button>
                                        <button class="btn btn-secondary" type="button" onclick="resetSearch()">重置</button>
                                    </div>
                                </div>
                            </div>

                            <div id="usersLoading" class="spinner">加载中...</div>
                            <div id="usersContainer" class="d-none">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>用户名</th>
                                            <th>角色</th>
                                            <th>Token 用量</th>
                                            <th>余额</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usersTableBody"></tbody>
                                </table>
                            </div>
                            <div id="usersPagination" style="margin-top: 20px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="dangerActionModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)cancelDangerAction()">
        <div class="modal-content admin-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="dangerActionTitle">高危操作确认</h3>
                <button class="modal-close" type="button" onclick="cancelDangerAction()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="dangerActionMessage" style="margin: 0 0 12px; color: #f4efe6;"></p>
                <div style="padding: 12px 14px; border-radius: 10px; background: rgba(238, 61, 92, 0.12); border: 1px solid rgba(238, 61, 92, 0.28); color: #ffd4dc;">
                    <strong>二次提醒：</strong>
                    <span id="dangerActionHint">此操作执行后将立即生效，请再次确认。</span>
                </div>
            </div>
            <div class="modal-footer">
                <button id="dangerActionConfirmBtn" class="btn btn-danger" type="button" onclick="confirmDangerAction()">确认</button>
                <button class="btn btn-secondary" type="button" onclick="cancelDangerAction()">取消</button>
            </div>
        </div>
    </div>

    <div id="userActionMenu" class="user-action-menu d-none">
        <button class="user-action-menu-item" type="button" onclick="openBalanceModal()">调整额度</button>
        <button id="userActionToggleItem" class="user-action-menu-item" type="button" onclick="handleUserActionToggle()"></button>
        <button class="user-action-menu-item danger" type="button" onclick="handleUserActionDelete()">删除用户</button>
    </div>

    <div id="balanceAdjustModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeBalanceModal()">
        <div class="modal-content admin-modal balance-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>调整用户额度</h3>
                <button class="modal-close" type="button" onclick="closeBalanceModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="balanceAdjustUserInfo" style="margin: 0 0 12px; color: #f4efe6;"></p>
                <div style="padding: 12px 14px; border-radius: 10px; background: rgba(168, 85, 247, 0.08); border: 1px solid rgba(168, 85, 247, 0.24); color: #eaddff; margin-bottom: 16px;">
                    当前余额：<strong id="balanceAdjustCurrentValue">¥ 0.00</strong>
                </div>
                <label for="balanceAdjustAmount" style="display:block; margin-bottom:8px; color:#f4efe6;">调整金额</label>
                <input id="balanceAdjustAmount" type="number" step="0.01" placeholder="正数为充值，负数为扣减" class="form-control">
                <div style="margin-top:10px; color:#d1b6ff; font-size:13px;">
                    示例：100 表示增加 100 元，-20.5 表示扣减 20.5 元。
                </div>
            </div>
            <div class="modal-footer">
                <button id="balanceAdjustConfirmBtn" class="btn btn-primary" type="button" onclick="submitBalanceAdjust()">确认调整</button>
                <button class="btn btn-secondary" type="button" onclick="closeBalanceModal()">取消</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/admin-users.js}"></script>
</body>
</html>
