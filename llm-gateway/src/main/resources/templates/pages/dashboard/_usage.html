<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- Dashboard - 使用统计标签页内容 -->
<th:block th:fragment="usageSection">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-value" id="todayTokens">0</div>
            <div class="stat-label">今日 Token</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-value" id="monthTokens">0</div>
            <div class="stat-label">本月 Token</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔄</div>
            <div class="stat-value" id="totalRequests">0</div>
            <div class="stat-label">总请求数</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-value" id="successRate">0%</div>
            <div class="stat-label">成功率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔐</div>
            <div class="stat-value" id="totalApiKeys">0</div>
            <div class="stat-label">API Key 总数</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🟢</div>
            <div class="stat-value" id="activeApiKeys">0</div>
            <div class="stat-label">启用中</div>
        </div>
    </div>
    <div class="card">
        <div class="card-title">近 7 日 Token 趋势</div>
        <div id="tokenTrendChart" style="height: 300px;"></div>
    </div>
</th:block>

</html>
