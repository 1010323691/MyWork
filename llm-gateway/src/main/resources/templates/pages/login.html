<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - LLM Gateway</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">LLM Gateway</div>
            <div class="login-subtitle">API 网关管理后台</div>

            <!-- 服务端错误信息 -->
            <div th:if="${error}" class="alert alert-error" style="margin-bottom:15px;" th:text="${error}"></div>

            <!-- 登录表单：提交给 Spring Security 处理 -->
            <!-- 说明：登录表单不需要 CSRF token，因为攻击者无法知道用户的密码 -->
            <form id="loginForm" action="/login" method="post">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名" autofocus>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>

                <button type="submit" class="btn btn-primary">登录</button>
            </form>

            <div style="text-align:center; margin-top:20px; font-size:14px; color:#666;">
                还没有账号？<a href="/register" style="color:#007bff; text-decoration:none;">立即注册</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
