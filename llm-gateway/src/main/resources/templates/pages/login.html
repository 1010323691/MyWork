<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - LLM Gateway</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="tech-orb-2"></div>

    <div class="login-container">
        <div class="login-card" role="main" aria-labelledby="loginTitle">
            <div class="auth-badge">Secure Access</div>
            <h1 id="loginTitle" class="login-logo">LLM Gateway</h1>
            <p class="login-subtitle">统一模型接入、鉴权与监控的科技风控制台入口。</p>
            <div id="uiToastHost" class="toast-host" aria-live="polite" aria-atomic="false"></div>

            <div th:if="${error}" class="alert alert-error" role="alert" th:text="${error}"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        placeholder="请输入用户名"
                        autofocus
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="请输入密码"
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary">进入控制台</button>
            </form>

            <p class="auth-footer">
                还没有账号？<a href="/register">立即注册</a>
            </p>
        </div>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
