spring:
  datasource:
    url: jdbc:h2:mem:llm_gateway_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
